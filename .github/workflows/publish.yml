name: Publish NuGet Package

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0'
      
      - name: Pack
        run: dotnet pack --configuration Release --output ./nupkg
      
      - name: Add NuGet source
        run: |
          dotnet nuget add source "https://nuget.pkg.github.com/ElizavetaLevina/index.json" \
            --name github \
            --username ElizavetaLevina \
            --password ${{ secrets.GITHUB_TOKEN }} \
            --store-password-in-clear-text
      
      - name: Push package
        run: |
          dotnet nuget push ./nupkg/*.nupkg \
            --source "https://nuget.pkg.github.com/ElizavetaLevina/index.json" \
            --api-key ${{ secrets.GITHUB_TOKEN }}
